<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wirekit App UI</title>
    <link href="https://cdn.wirekit.dev/4.x/wirekit.min.css" rel="stylesheet" />
  </head>
  <body>
    <main class="wk-container">
      <header class="wk-navbar">
        <strong>Mobile Codespaces VS Code Test</strong>
        <button class="wk-btn wk-btn-primary">Sign in</button>
      </header>

      <section class="wk-card">
        <h1>Wirekit UI baseline</h1>
        <p>This app shell is implemented with Wirekit styles and components.</p>
        <div>
          <button class="wk-btn wk-btn-primary">Primary action</button>
          <button class="wk-btn wk-btn-secondary">Secondary action</button>
        </div>
      </section>
    </main>

    <script src="https://cdn.wirekit.dev/4.x/wirekit.min.js"></script>
  </body>
</html>
